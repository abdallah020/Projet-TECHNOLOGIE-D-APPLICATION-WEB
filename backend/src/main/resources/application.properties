# ============================================================
# APPLICATION
# ============================================================
spring.application.name=universite-app-backend
app.version=1.0.0

# ============================================================
# SERVER
# ============================================================
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================================
# DATABASE (PostgreSQL)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/universite_db
spring.datasource.username=universite_user
spring.datasource.password=universite123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?? IMPORTANT EN DEV (corrige ton erreur "missing column")
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ============================================================
# JWT CONFIGURATION
# ============================================================
# ?? IMPORTANT : clé doit ętre longue et en BASE64
jwt.secret=Y2hhbmdlX3RoaXNfdG9fYXZvaWRfc2lnbmF0dXJlX2VycmV1cg==
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.algorithm=HS256

# ============================================================
# LOGGING (debug utile pour Spring Security)
# ============================================================
logging.level.root=INFO
logging.level.com.universite=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# ============================================================
# FILE UPLOAD (si tu utilises fichiers)
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# ============================================================
# SWAGGER
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# ACTUATOR (optionnel)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# TIMEZONE
# ============================================================
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# DEVTOOLS
# ============================================================
spring.devtools.restart.enabled=true